name: Deploy catalog to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "rules.json"
      - "custom-rules.json"
      - "rules-custom/**"
      - "stacks.json"
      - "repo.json"
      - "install.sh"
      - "src/generate_catalog.py"
      - "src/repo_config.py"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate catalog.json
        run: python src/generate_catalog.py

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
